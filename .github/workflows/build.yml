name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: test
        run: pip install pyinstaller PySide6 requests
      - name: Build
        working-directory: test
        run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: launcher-windows
          path: test/dist/launcher-windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: test
        run: pip install pyinstaller PySide6 requests
      - name: Build
        working-directory: test
        run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: launcher-macos
          path: test/dist/launcher-macos

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/launcher-windows/launcher-windows.exe
            artifacts/launcher-macos/launcher-macos
          generate_release_notes: true
